################
### MONITORS ###
################

monitor = HDMI-A-1, 1920x1080@60, 0x0, 1.0


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun


#################
### AUTOSTART ###
#################

exec-once = waybar & awww-daemon & /usr/lib/polkit-kde-authentication-agent-1
exec-once = sleep 1 && awww img /home/vyevd/Pictures/Wallpapers/Ryo.jpg
exec-once = wl-paste --type text --watch cliphist store & wl-paste --type image --watch cliphist store
exec-once = pkill -f "^gpu-screen-recorder"; sleep 0.5; gpu-screen-recorder -w screen -f 60 -a "default_output|device:alsa_input.usb-352f_PD100X_Podcast_Microphone_214b206000000178-00.mono-fallback" -r 30 -c mp4 -bm cbr -q 4000 -k h264 -replay-storage ram -sc /home/vyevd/.config/gpu-screen-recorder/compress-replay.sh -o ~/Videos/Replays


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3
    col.active_border = rgba(64,97,160,1.0) rgba(230,212,123,1.0) 35deg
    col.inactive_border = rgba(26,42,69,0.4)
}

decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.9

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0d152088)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     8,     easeOutQuint, slide
    animation = workspacesIn,  1,     8,     easeOutQuint, slide
    animation = workspacesOut, 1,     8,     easeOutQuint, slide
    animation = zoomFactor,    1,     7,     quick
}

# workspace 9 to avoid overlap with other games (not tested in a while)
windowrule {
    name = rdr2-fullscreen
    match:class = Red Dead Redemption 2
    fullscreen = true
    suppress_event = fullscreen
    float = false
    workspace = 9 silent
}

dwindle {
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 1 # disable anime mascot wallpaper
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    middle_click_paste = false
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us,gr,de          # english, greek, german
    kb_options = grp:alt_shift_toggle
    kb_variant =
    kb_model =
    kb_rules =
    follow_mouse = 1
    sensitivity = -0.1
    force_no_accel = true
    accel_profile = flat
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = ALT, grave, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFT, S, exec, bash -c 'grimblast --freeze save area - | wl-copy'
bind = $mainMod SHIFT, L, exec, bash -c 'grimblast --freeze save area ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S%N).png'
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, F11, fullscreen, 0
bind = $mainMod, period, exec, rofi -modi emoji -show emoji   # muscle memory from windows
bind = , F8, exec, pkill -SIGUSR1 -f "^gpu-screen-recorder"  # medal clipping alternative, auto-compresses via ffmpeg

# focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


##############################
### WINDOWS AND WORKSPACES ###
##############################

# Ignore maximize requests from all apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
