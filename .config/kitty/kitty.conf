# Fonts
font_family      JetBrainsMono Nerd Font Mono
font_size        11.0
text_composition_strategy 2.5 2
font_antialiasing grayscale
disable_ligatures always
enable_audio_bell no
window_padding_width 8
confirm_os_window_close 0

# == Ryo colorscheme ===========================================
# navy dark   #0d1520
# navy mid    #1a2a45
# blue accent #4a7ab5
# gold warm   #E6D47B
# gold light  #E6D47B
# white muted #cdd3e0
# ==============================================================

foreground              #cdd3e0
background              #0d1520
selection_foreground    #0d1520
selection_background    #4a7ab5

cursor                  #E6D47B
cursor_text_color       #0d1520

url_color               #e8b84b

active_border_color     #4a7ab5
inactive_border_color   #1a2a45
bell_border_color       #c49a2a

wayland_titlebar_color  #0d1520

# Tab bar
active_tab_foreground   #0d1520
active_tab_background   #4a7ab5
inactive_tab_foreground #8890a4
inactive_tab_background #111d2e
tab_bar_background      #0a1018

# Marks
mark1_foreground #0d1520
mark1_background #4a7ab5
mark2_foreground #0d1520
mark2_background #c49a2a
mark3_foreground #0d1520
mark3_background #e8b84b

# 16 terminal colors
# black
color0  #1a2a45
color8  #2a3d5e

# red
color1  #c0605a
color9  #d4706a

# green
color2  #5a9e6f
color10 #6ab87f

# yellow
color3  #c49a2a
color11 #e8b84b

# blue
color4  #4a7ab5
color12 #6090c8

# magenta
color5  #7a6ab0
color13 #9080c8

# cyan
color6  #4a8fa0
color14 #5aaab8

# white
color7  #cdd3e0
color15 #dde3f0

map super+shift+enter new_os_window_with_cwd
